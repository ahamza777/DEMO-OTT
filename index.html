<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MY OTT</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1 class="logo">MY OTT</h1>

<!-- SHOWS -->
<div id="shows" class="section">
    <h2>Popular</h2>
    <div class="slider">
        <div class="poster" onclick="showSeasons()">
            <img src="invincible.jpg">
            <span>Invincible</span>
        </div>
    </div>
</div>

<!-- SEASONS -->
<div id="seasons" class="section hidden">
    <button class="back" onclick="goBack('shows')">⬅ Back</button>
    <h2>Seasons</h2>
    <div class="slider">
        <div class="poster" onclick="showEpisodes()">
            <img src="season2.jpg">
            <span>Season 2</span>
        </div>
    </div>
</div>

<!-- EPISODES -->
<div id="episodes" class="section hidden">
    <button class="back" onclick="goBack('seasons')">⬅ Back</button>
    <h2>Episodes</h2>
    <div class="slider">
        <div class="episode"><a href="Invincible S02E01.mkv">E01</a></div>
        <div class="episode"><a href="Invincible S02E02.mkv">E02</a></div>
        <div class="episode"><a href="Invincible S02E03.mkv">E03</a></div>
        <div class="episode"><a href="Invincible S02E04.mkv">E04</a></div>
        <div class="episode"><a href="Invincible S02E05.mkv">E05</a></div>
        <div class="episode"><a href="Invincible S02E06.mkv">E06</a></div>
        <div class="episode"><a href="Invincible S02E07.mkv">E07</a></div>
        <div class="episode"><a href="Invincible S02E08.mkv">E08</a></div>
    </div>
</div>

<script>
function showSeasons(){
    document.getElementById("shows").classList.add("hidden");
    document.getElementById("seasons").classList.remove("hidden");
}

function showEpisodes(){
    document.getElementById("seasons").classList.add("hidden");
    document.getElementById("episodes").classList.remove("hidden");
}

function goBack(section){
    document.getElementById("shows").classList.add("hidden");
    document.getElementById("seasons").classList.add("hidden");
    document.getElementById("episodes").classList.add("hidden");
    document.getElementById(section).classList.remove("hidden");
}
</script>

</body>
</html>
